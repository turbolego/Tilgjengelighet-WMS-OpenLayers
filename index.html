<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tilgjengelighet – Geonorge kartvisning</title>
  <meta name="description" content="Interaktivt kart som viser tilgjengelighetsdata fra Geonorge for universell utforming i Norge." />
  <link rel="stylesheet" href="style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="manifest" href="assets/site.webmanifest">
</head>
<body>

  <a class="skip-link" href="#map">Hopp til kartet</a>

  <!-- Full-screen map target -->
  <div id="map" class="map-container" tabindex="0" role="application"
       aria-label="Interaktivt kart over tilgjengelighetsdata i Norge."></div>

  <!-- ── Feature info modal (same pattern as settings) ───────────────────── -->
  <div id="popup" class="ol-feature-modal ol-unselectable" hidden>
    <div class="feature-modal-inner">
      <header class="settings-header">
        <span class="settings-title" id="popup-title">Stedsinfo</span>
        <button id="popup-closer" class="settings-close" aria-label="Lukk stedsinfo">✕</button>
      </header>
      <div class="feature-modal-body" id="popup-content"></div>
    </div>
  </div>

  <!-- ── Settings panel ───────────────────────────────────────────────────── -->
  <div id="settings-panel" class="ol-settings-panel ol-unselectable" hidden>
    <div class="settings-inner">

      <header class="settings-header">
        <span class="settings-title">Innstillinger</span>
        <button id="btn-close-settings" class="settings-close" aria-label="Lukk innstillinger">✕</button>
      </header>

      <div class="settings-body">

        <section class="settings-section">
          <h3 class="settings-heading">Søk etter sted</h3>
          <input type="search" id="place-search" class="search-input"
            placeholder="Skriv inn stedsnavn…" aria-label="Søk etter sted" autocomplete="off" />
          <ul id="search-results" class="search-results" aria-live="polite"></ul>
        </section>

        <section class="settings-section">
          <h3 class="settings-heading">Kartlag</h3>
          <p id="layer-hint" class="settings-desc">Velg hvilke lag du vil vise på kartet.</p>
          <div id="layer-loading" class="loading-state" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <span>Laster kartlag…</span>
          </div>
          <div id="layer-tree" role="tree" aria-labelledby="layer-hint" hidden></div>
        </section>

        <section class="settings-section">
          <h3 class="settings-heading">Bakgrunnskart</h3>
          <fieldset class="basemap-fieldset">
            <legend class="sr-only">Velg bakgrunnskart</legend>
            <label class="radio-label"><input type="radio" name="basemap" value="osm" checked /> OpenStreetMap</label>
            <label class="radio-label"><input type="radio" name="basemap" value="topo" /> Topografisk (Kartverket)</label>
            <label class="radio-label"><input type="radio" name="basemap" value="none" /> Ingen bakgrunn</label>
          </fieldset>
        </section>

      </div>

      <footer class="settings-footer">
        <a href="https://www.geonorge.no/" target="_blank" rel="noopener">Kartverket / Geonorge</a>
        · © Statens kartverk
      </footer>
    </div>
  </div>

  <!-- ── Unified button bar (zoom + actions) ──────────────────────────────── -->
  <!-- Single OL Control — one positioned group, no overlap possible -->
  <div id="action-bar" class="ol-action-bar ol-unselectable ol-control">
    <button id="btn-zoom-in"  aria-label="Zoom inn">+</button>
    <button id="btn-zoom-out" aria-label="Zoom ut">−</button>
    <hr class="action-bar-divider" aria-hidden="true" />
    <button id="btn-reset-view" aria-label="Tilbakestill kartvisning til Norge">⌂</button>
    <button id="btn-gps"        aria-label="Vis min posisjon">📍</button>
    <hr class="action-bar-divider" aria-hidden="true" />
    <button id="btn-open-settings" aria-label="Åpne innstillinger og kartlag" aria-expanded="false">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- ── Status control ────────────────────────────────────────────────────── -->
  <div id="status-bar" class="ol-status-bar ol-unselectable ol-control"
       role="status" aria-live="polite" aria-atomic="true">
    Zoom: <span id="status-zoom">5</span> · Lag: <span id="status-layers">0</span>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
