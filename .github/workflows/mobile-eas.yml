name: Mobile EAS Build

on:
  push:
    branches: [main]
    paths:
      - mobile/**
      - packages/shared/**
      - .github/workflows/mobile-eas.yml
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  eas:
    runs-on: ubuntu-latest
    env:
      EAS_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
      EAS_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Build mobile binaries
        run: eas build --platform "$EAS_PLATFORM" --profile "$EAS_PROFILE" --non-interactive --no-wait
        working-directory: mobile
